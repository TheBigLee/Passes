name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: >
          ./gradlew :app:assembleRelease
          -PversionName=${{ steps.ver.outputs.name }}
          -PversionCode=${{ github.run_number }}
          --stacktrace

      - name: Name the APK after the version
        run: cp app/build/outputs/apk/release/app-release.apk "Passes-${{ steps.ver.outputs.tag }}.apk"

      - name: Build changelog
        id: build_changelog
        continue-on-error: true
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          # Use the current commit, not the tag name: on workflow_dispatch the tag doesn't
          # exist as a real git ref yet (it's only created below by action-gh-release), so
          # resolving it here would fail. fromTag is left unset - the action auto-detects the
          # previous release/tag as the range start.
          toTag: ${{ github.sha }}
          configuration: .github/release-changelog-builder-config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Passes ${{ steps.ver.outputs.tag }}
          body: ${{ steps.build_changelog.outputs.changelog || format('Release {0}', steps.ver.outputs.tag) }}
          files: Passes-${{ steps.ver.outputs.tag }}.apk
          fail_on_unmatched_files: true
